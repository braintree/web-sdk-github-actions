name: "PR Jira Ticket Reference Check"

on:
  workflow_call:
    inputs:
      jira-url-pattern:
        description: "Regex pattern for Jira ticket URLs in PR body"
        required: false
        type: string
        default: 'https://paypal\.atlassian\.net/browse/[A-Z]+-[0-9]+'
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  jira-reference-check:
    if: >-
      github.actor != 'dependabot[bot]' &&
      !contains(github.actor, '[bot]') &&
      !contains(github.event.pull_request.labels.*.name, 'no-jira') &&
      github.event.pull_request.draft == false
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: "Check for Jira ticket reference"
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          JIRA_PATTERN: ${{ inputs.jira-url-pattern }}
        run: |
          echo "Jira Reference Check:"

          if echo "$PR_BODY" | grep -qE "$JIRA_PATTERN"; then
            echo "  Body: found"
          else
            echo "::error::Missing Jira ticket link in PR body. Include the full Jira ticket link:"
            echo "  | [Jira ticket](https://paypal.atlassian.net/browse/DTBTWEB-123) |"
            exit 1
          fi
