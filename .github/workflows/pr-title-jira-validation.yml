name: "Validate PR"

on:
  workflow_call:
    inputs:
      jira-url-pattern:
        description: "Regex pattern for Jira ticket URLs in PR body"
        required: false
        default: 'https://paypal\.atlassian\.net/browse/[A-Z]+-[0-9]+'
        type: string
      conventional-commit-types:
        description: "Newline-separated list of allowed conventional commit types"
        required: false
        type: string
        default: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
      conventional-commit-scopes:
        description: "Newline-separated list of allowed scopes (empty = any scope allowed)"
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
      ignore-labels:
        description: "Newline-delimited labels that will skip title validation"
        required: false
        type: string
        default: ""
    secrets:
      github-token:
        required: true

jobs:
  pr-validation:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
        with:
          types: ${{ inputs.conventional-commit-types }}
          scopes: ${{ inputs.conventional-commit-scopes }}
          ignoreLabels: ${{ inputs.ignore-labels }}

  jira-reference-check:
    permissions:
      pull-requests: read
      contents: read
    name: "Jira Reference Check"
    if:
      "github.actor != 'dependabot[bot]' && !contains(github.actor, '[bot]') &&
      !contains(github.event.pull_request.labels.*.name, 'no-jira') &&
      github.event.pull_request.draft == false"
    runs-on: gh-2-core-ubuntu-latest
    steps:
      - env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PATTERN='https://paypal\.atlassian\.net/browse/[A-Z]+-[0-9]+'
          if echo "$PR_BODY" | grep -qE "$PATTERN"; then
            echo "Jira ticket found"
          else
            echo "::error::Missing Jira ticket link in PR body. Include the full Jira ticket link:"
            echo "  | [Jira ticket](https://paypal.atlassian.net/browse/DTBTWEB-123) |"
            exit 1
          fi
