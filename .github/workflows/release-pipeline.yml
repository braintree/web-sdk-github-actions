name: "Release package"
run-name: Deploy ${{ github.repository }} to npmjs by @${{ github.actor }}
description: "Runs CI, bumps version, and publishes to NPM"

on:
  workflow_call:
    inputs:
      version-type:
        description: "Version bump type (major, minor, patch)"
        required: true
        type: string
      lint-command:
        description: "Lint command for CI step (set to empty string to skip)"
        required: false
        type: string
        default: "npx eslint . --ext .js,.ts"
      test-command:
        description: "Test command for CI step"
        required: false
        type: string
        default: "npm test"
      base-branch:
        description: "Branch to target for the release PR (default: main)"
        required: false
        type: string
        default: "main"
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      npm-token:
        description: "npm access token (e.g. BRAINTREE_NPM_ACCESS_TOKEN)"
        required: true

permissions: {}

concurrency:
  group: npm-publish
  cancel-in-progress: true

jobs:
  ci:
    uses: braintree/web-sdk-github-actions/.github/workflows/ci.yml@main
    with:
      lint-command: ${{ inputs.lint-command }}
      test-command: ${{ inputs.test-command }}
      runs-on: ${{ inputs.runs-on }}

  bump-version:
    needs: ci
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
    steps:
      - uses: actions/checkout@v6

      - name: "Bump version"
        id: bump
        uses: braintree/web-sdk-github-actions/actions/version-bump@main
        with:
          version-type: ${{ inputs.version-type }}
          base-branch: ${{ inputs.base-branch }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: bump-version
    runs-on: ${{ inputs.runs-on }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: "Publish to npm"
        uses: braintree/web-sdk-github-actions/actions/npm-publish@main
        with:
          npm-token: ${{ secrets.npm-token }}

  publish-release:
    needs: publish-npm
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: "Create release notes"
        uses: braintree/web-sdk-github-actions/actions/release-notes@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
