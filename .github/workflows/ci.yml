name: "CI"

on:
  workflow_call:
    inputs:
      lint-command:
        description: "Lint command to run (set to empty string to skip)"
        required: false
        type: string
        default: "npx eslint . --ext .js,.ts"
      test-command:
        description: "Test command to run"
        required: false
        type: string
        default: "npm test"
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
      node-version-file:
        description: "Path to node version file"
        required: false
        type: string
        default: ".nvmrc"

jobs:
  build:
    name: "CI"
    runs-on: ${{ inputs.runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: "Setup Node Environment"
        uses: braintree/web-sdk-github-actions/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}

      - name: "Lint"
        if: inputs.lint-command != ''
        run: ${{ inputs.lint-command }}

      - name: "Test"
        run: ${{ inputs.test-command }}
