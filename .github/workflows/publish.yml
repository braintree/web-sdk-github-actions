name: "Publish Package"
run-name: Publish ${{ github.repository }} to npmjs by @${{ github.actor }}
description: "ONLY publishes to NPM"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to publish (e.g. v3.142.1)"
        required: true
        type: string
      dry-run:
        description: "Run publish steps without side effects (npm --dry-run, skip GitHub release)"
        required: false
        type: boolean
        default: false
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
  workflow_call:
    inputs:
      ref:
        description: "Tag or ref to publish (e.g. v3.142.1)"
        required: true
        type: string
      dry-run:
        description: "Run publish steps without side effects (npm --dry-run, skip GitHub release)"
        required: false
        type: boolean
        default: false
      runs-on:
        description: "Runner label"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      npm-token:
        description: "npm access token (e.g. BRAINTREE_NPM_ACCESS_TOKEN)"
        required: true

permissions: {}

concurrency:
  group: npm-publish
  cancel-in-progress: true

jobs:
  publish-npm:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: "Publish to npm"
        uses: braintree/web-sdk-github-actions/actions/npm-publish@main
        with:
          npm-token: ${{ secrets.npm-token }}
          dry-run: ${{ inputs.dry-run }}

  publish-release:
    needs: publish-npm
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: "Create release notes"
        uses: braintree/web-sdk-github-actions/actions/release-notes@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ inputs.dry-run }}
