name: "Validate PR"
description: "Checks that PR title follows conventional commits and body contains a Jira ticket link"

inputs:
  github-token:
    description: "GitHub token for PR title check"
    required: true
  jira-url-pattern:
    description: "Regex pattern for Jira ticket URLs in PR body"
    required: false
    default: 'https://paypal\.atlassian\.net/browse/[A-Z]+-[0-9]+'
  conventional-commit-types:
    description: "Newline-separated list of allowed conventional commit types"
    required: false
    default: |
      feat
      fix
      docs
      style
      refactor
      perf
      test
      build
      ci
      chore
      revert
  conventional-commit-scopes:
    description: "Newline-separated list of allowed scopes (empty = any scope allowed)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: "Check PR title follows conventional commits"
      uses: braintree/web-sdk-github-actions/.github/workflows/pr-title-validation@main
      with:
        github-token: ${{ inputs.github-token }}
        conventional-commit-types: ${{ inputs.conventional-commit-types }}
        conventional-commit-scopes: ${{ inputs.conventional-commit-scopes }}
        runs-on: ${{ inputs.runs-on }}

    - name: "Check for Jira ticket reference"
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        JIRA_PATTERN: ${{ inputs.jira-url-pattern }}
      shell: bash
      run: |
        echo "Jira Reference Check:"
        if echo "$PR_BODY" | grep -qE "$JIRA_PATTERN"; then
          echo "  Body: found"
        else
          echo "::error::Missing Jira ticket link in PR body. Include the full Jira ticket link:"
          echo "  | [Jira ticket](https://paypal.atlassian.net/browse/DTBTWEB-123) |"
          exit 1
        fi
