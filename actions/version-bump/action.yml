name: "Version Bump"
description: "Validate CHANGELOG, bump npm version, create release branch + PR, merge, and tag"

inputs:
  version-type:
    description: "Version bump type (major, minor, patch)"
    required: true
  github-token:
    description: "GitHub token for creating/merging PRs"
    required: true
  base-branch:
    description: "Branch to target for the release PR"
    required: false
    default: "main"

outputs:
  new-version:
    description: "The new version number (without v prefix)"
    value: ${{ steps.bump.outputs.new_version }}

runs:
  using: "composite"
  steps:
    - name: "Configure git credentials"
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
      shell: bash

    - name: "Validate CHANGELOG"
      run: |
        if ! grep -i -q "## UNRELEASED" CHANGELOG.md; then
          echo "::error::UNRELEASED section not found in CHANGELOG.md"
          exit 1
        fi
      shell: bash

    - name: "Setup Node.js"
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: "Bump npm version"
      id: bump
      run: |
        new_version=$(npm version ${{ inputs.version-type }})
        new_version=$(echo "$new_version" | sed 's/v//')
        echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
        echo "### Version Bump" >> "$GITHUB_STEP_SUMMARY"
        echo "${{ inputs.version-type }} → **$new_version**" >> "$GITHUB_STEP_SUMMARY"
      shell: bash

    - name: "Update CHANGELOG date"
      run: |
        today=$(date +'%Y-%m-%d')
        sed -i "s/## unreleased/## ${{ steps.bump.outputs.new_version }} (${today})/i" CHANGELOG.md
      shell: bash

    - name: "Commit changelog"
      run: |
        git add --all
        git commit -m "Changelog for v${{ steps.bump.outputs.new_version }}"
      shell: bash

    - name: "Create release branch and push"
      run: |
        git checkout -b "release/v${{ steps.bump.outputs.new_version }}"
        git push -u origin "release/v${{ steps.bump.outputs.new_version }}" --tags
      shell: bash

    - name: "Create and merge PR"
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        pr_url=$(gh pr create \
          --title "Release v${{ steps.bump.outputs.new_version }}" \
          --body "Updated changelog for release v${{ steps.bump.outputs.new_version }}" \
          --base "$BASE_BRANCH" \
          --head "release/v${{ steps.bump.outputs.new_version }}")

        pr_number=$(echo "$pr_url" | awk -F/ '{print $NF}')
        gh pr merge "$pr_number" --admin --merge --delete-branch

        echo "#### Merged release PR: $pr_url" >> "$GITHUB_STEP_SUMMARY"
      shell: bash

    - name: "Tag final version on main"
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        git checkout "$BASE_BRANCH"
        git pull
        git tag -m "${{ steps.bump.outputs.new_version }}" "${{ steps.bump.outputs.new_version }}"
        git push origin "$BASE_BRANCH" --tags
      shell: bash
